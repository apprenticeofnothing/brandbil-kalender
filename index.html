<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Brandbil Countdown Kalender</title>

  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Brandbil">
  <meta name="theme-color" content="#c8102e" media="(prefers-color-scheme: light)">
  <meta name="theme-color" content="#1a0608" media="(prefers-color-scheme: dark)">

  <link rel="apple-touch-icon" href="icon-180.png">
  <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
  <link rel="manifest" href="manifest.webmanifest?v=13">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bangers&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <main>
    <header class="hero">
      <div class="title">
        <span class="title-row-1">Brandbil Countdown</span>
        <span class="title-row-2">Kalender</span>
      </div>
      <div class="hero-circle" id="heroCircle">
        <img src="photo.jpg?v=13" alt="" class="hero-photo hero-photo-intro" decoding="async">
        <img src="photo-calendar.jpg?v=13" alt="" class="hero-photo hero-photo-calendar" decoding="async">
        <div class="big-number" id="bigNumber" aria-live="polite">
          <svg class="big-number-svg" viewBox="0 0 200 120" preserveAspectRatio="xMidYMid meet" aria-hidden="true">
            <text x="100" y="60" text-anchor="middle" dominant-baseline="central">–</text>
          </svg>
          <span class="big-number-emoji" aria-hidden="true">🚒</span>
        </div>
      </div>
      <div class="hero-label-stack" id="heroLabelStack">
        <div class="big-label" id="bigLabel">indlæser…</div>
        <div class="hero-label-bridge" id="heroLabelBridge" aria-hidden="true">TIL MIN SØDESTE VEN</div>
      </div>
    </header>

    <div class="view-toggle" id="viewToggle" role="tablist" aria-label="Visning">
      <button class="view-pill active" data-view="grid"  type="button">Kalender</button>
      <button class="view-pill"        data-view="table" type="button">Liste</button>
    </div>

    <ol class="day-list" id="dayList" aria-label="Dage"></ol>
    <div class="day-grid" id="dayGrid" aria-label="Kalender">
      <div class="grid-weekdays" aria-hidden="true">
        <span>M</span><span>T</span><span>O</span><span>T</span><span>F</span><span>L</span><span>S</span>
      </div>
      <div class="grid-cells" id="gridCells"></div>
    </div>

    <footer class="foot">
      <div id="footNote">5.&nbsp;maj – 24.&nbsp;maj 2026</div>
      <div class="foot-credit">a cheeseball production by nor</div>
    </footer>
  </main>

  <script src="app.js?v=13"></script>
</body>
</html>
